# QA Platform reverse proxy for third-party sharing
#
# Install example (Ubuntu):
#   sudo cp deploy/nginx/qa_platform.conf /etc/nginx/sites-available/qa_platform
#   sudo ln -sf /etc/nginx/sites-available/qa_platform /etc/nginx/sites-enabled/qa_platform
#   sudo nginx -t && sudo systemctl reload nginx
#
# Optional: issue certificates with certbot and use the TLS server block below.

upstream qa_dashboard {
    server 127.0.0.1:8050;
    keepalive 16;
}

upstream qa_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

# Optional allowlist file example:
#   allow 203.0.113.0/24;
#   allow 198.51.100.25;
#   deny all;
# Save as /etc/nginx/snippets/qa_platform_allowlist.conf

# Optional Basic Auth setup:
#   sudo apt install apache2-utils
#   sudo htpasswd -c /etc/nginx/.htpasswd-qa-platform qauser

server {
    listen 80;
    listen [::]:80;
    server_name qa.example.com;

    # If HTTPS is available, force redirect to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qa.example.com;

    # Set your real certificate paths.
    ssl_certificate /etc/letsencrypt/live/qa.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qa.example.com/privkey.pem;

    # Reasonable TLS defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 25m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Uncomment one or both options when sharing externally.
    # auth_basic "QA Platform";
    # auth_basic_user_file /etc/nginx/.htpasswd-qa-platform;
    # include /etc/nginx/snippets/qa_platform_allowlist.conf;

    # FastAPI routes stay under /api/
    location /api/ {
        proxy_pass http://qa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }

    # Dash long callbacks / websocket upgrade endpoint
    location /_dash-update-component {
        proxy_pass http://qa_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
    }

    # Dash assets and all UI routes
    location / {
        proxy_pass http://qa_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }
}
