# QA Platform reverse proxy (Ubuntu production template)
# Install as: /etc/nginx/sites-available/qa_platform
# Enable with:
#   sudo ln -s /etc/nginx/sites-available/qa_platform /etc/nginx/sites-enabled/qa_platform
#   sudo nginx -t && sudo systemctl reload nginx

upstream qa_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

upstream qa_dashboard {
    server 127.0.0.1:8050;
    keepalive 16;
}

server {
    listen 80;
    server_name qa.example.com;

    client_max_body_size 20m;

    # HTTP security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # FastAPI (docs/openapi/health and API routes)
    location /api/ {
        proxy_pass http://qa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Dash websocket updates
    location /_dash-update-component {
        proxy_pass http://qa_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Dash app
    location / {
        proxy_pass http://qa_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
